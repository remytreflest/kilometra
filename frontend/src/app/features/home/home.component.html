<div class="home-container">

  <!-- Screen Label -->
  <div class="screen-label">
    <p>01 — Accueil</p>
  </div>

  <!-- Hero Section -->
  <div class="hero">

    <!-- Glow Effects -->
    <div class="glow glow-yellow"></div>
    <div class="glow glow-blue"></div>

    <!-- Badge -->
    <div class="badge">
      <span>✦ Michelin Certified Platform</span>
    </div>

    <!-- Logo -->
    <div class="logo">
      <h1>KILO</h1>
      <h1 class="accent">METRA.</h1>
    </div>

    <!-- Tagline -->
    <p class="tagline">
      La performance commence là où le pneu Michelin rencontre l'asphalte.
    </p>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <p class="value"><span>2</span><span class="accent"> 600</span></p>
        <p class="label">Clubs</p>
      </div>

      <div class="stat">
        <p class="value"><span>600</span><span class="accent"> K</span></p>
        <p class="label">Cyclistes</p>
      </div>

      <div class="stat">
        <p class="value"><span>+</span><span class="accent"> 30</span></p>
        <p class="label">Dotations/mois</p>
      </div>
    </div>

    <!-- CTA Primary -->
    <button class="cta-primary">
      ⚡ Connecter Strava
    </button>

    <!-- CTA Secondary -->
    <button class="cta-secondary" (click)="onNavigate('leaderboards')">
      Découvrir la communauté →
    </button>

  </div>
</div>
