# Docker Compose — Production (Docker Swarm)
# Déploiement : docker stack deploy --compose-file docker-compose.prod.yml michelin
#
# Variables d'environnement requises (sourcées depuis /opt/stacks/michelin/.env) :
#   IMAGE_API, IMAGE_FRONTEND, DATABASE_URL, JWT_SECRET,
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#
# Scalabilité :
#   docker service scale michelin_api=3
#   docker service scale michelin_frontend=2

version: '3.8'

services:

  # ──────────────────────────────────────────────────────────
  # FRONTEND — Angular servi par Nginx
  # Nginx proxie aussi /api/ vers le service api (nginx.conf existant)
  # Port 8080 exposé sur localhost uniquement → accessible depuis le Nginx VPS
  # ──────────────────────────────────────────────────────────
  frontend:
    image: ${IMAGE_FRONTEND}
    ports:
      - "8080:80"
    networks:
      - michelin_net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

  # ──────────────────────────────────────────────────────────
  # API — Express / Node.js
  # Migrations Prisma automatiques au démarrage (docker-entrypoint.sh)
  # Scalable horizontalement — le VIP Swarm load-balance entre réplicas
  # ──────────────────────────────────────────────────────────
  api:
    image: ${IMAGE_API}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET:   ${JWT_SECRET}
      NODE_ENV:     production
    networks:
      - michelin_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first     # stop-first pour éviter les migrations Prisma concurrentes
        failure_action: rollback

  # ──────────────────────────────────────────────────────────
  # POSTGRES — Base de données
  # Contrainte manager : le volume reste sur le nœud principal
  # Ne pas scaler — utiliser une solution HA séparée si nécessaire
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - michelin_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

networks:
  michelin_net:
    driver: overlay
    attachable: true

volumes:
  db_data:
    driver: local
