# ──────────────────────────────────────────────────────────
# VHOST INITIAL — michelin.qwaklab.fr (HTTP uniquement)
# À uploader AVANT l'obtention du certificat SSL.
# Permet le challenge ACME Let's Encrypt via webroot.
#
# Ce fichier est remplacé par michelin.qwaklab.fr.conf
# après l'obtention du certificat.
# ──────────────────────────────────────────────────────────

server {
    listen 80;
    server_name michelin.qwaklab.fr;

    # Challenge ACME Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Proxy vers le stack Michelin (HTTP pendant la phase d'init)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
    }
}
