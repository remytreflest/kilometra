# ──────────────────────────────────────────────────────────
# VHOST FINAL — michelin.qwaklab.fr (HTTP redirect + HTTPS)
# À uploader APRÈS l'obtention du certificat SSL.
# Remplace michelin.qwaklab.fr-init.conf.
#
# Prérequis : certificat présent dans
#   /etc/letsencrypt/live/michelin.qwaklab.fr/
# ──────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name michelin.qwaklab.fr;

    # Conserver le challenge ACME pour les renouvellements auto
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://michelin.qwaklab.fr$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name michelin.qwaklab.fr;

    ssl_certificate     /etc/letsencrypt/live/michelin.qwaklab.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/michelin.qwaklab.fr/privkey.pem;

    ssl_session_timeout  1d;
    ssl_session_cache    shared:MozSSL:10m;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Proxy vers le stack Michelin (port 8080 en HTTP interne)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
